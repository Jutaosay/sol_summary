<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>sol_summary</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg:#f8fafc; --fg:#0f172a; --muted:#64748b; --card:#fff; --border:#e2e8f0;
      --ok-bg:#dcfce7; --ok-fg:#166534; --warn-bg:#fef3c7; --warn-fg:#92400e; --err-bg:#fee2e2; --err-fg:#991b1b;
    }
    body.dark {
      --bg:#0b1220; --fg:#e2e8f0; --muted:#94a3b8; --card:#111827; --border:#1f2937;
      --ok-bg:#052e16; --ok-fg:#86efac; --warn-bg:#422006; --warn-fg:#fcd34d; --err-bg:#450a0a; --err-fg:#fca5a5;
    }
    body { font-family: Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif; margin: 20px; background:var(--bg); color:var(--fg); }
    .card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:14px; margin-bottom:12px; }
    .row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-bottom:10px; }
    input, select { padding:8px 10px; border:1px solid #cbd5e1; border-radius:8px; }
    body.dark input, body.dark select { background:#0f172a; color:#e2e8f0; border-color:#334155; }
    input#ca { min-width: 520px; }
    button { padding:8px 12px; border:none; border-radius:8px; cursor:pointer; }
    #start { background:#16a34a; color:#fff; }
    #stop { background:#ef4444; color:#fff; }
    #refreshNow { background:#2563eb; color:#fff; }
    #copyCa, #themeToggle { background:#334155; color:#fff; }
    .muted { color: var(--muted); font-size:13px; }
    .badge { display:inline-block; padding:2px 8px; border-radius:999px; font-size:12px; }
    .ok { background:var(--ok-bg); color:var(--ok-fg); }
    .warn { background:var(--warn-bg); color:var(--warn-fg); }
    .err { background:var(--err-bg); color:var(--err-fg); }
    .kpis { display:grid; grid-template-columns: repeat(4, minmax(120px, 1fr)); gap:10px; }
    .kpi { background:var(--bg); border:1px solid var(--border); border-radius:10px; padding:10px; }
    .kpi .v { font-weight:700; font-size:18px; }
    canvas { max-width: 1200px; height: 420px; }
    #activity { max-height:140px; overflow:auto; font-size:12px; line-height:1.6; }
  </style>
</head>
<body>
  <h2>sol_summary 实时监控</h2>

  <div class="card">
    <div class="row">
      <input id="ca" placeholder="输入 CA" value="E9SmMCvtLfitMwkLzkduwgN8ZYcfepiELLQ8d1SApump" />
      <button id="copyCa">复制CA</button>
      <button id="start">开始追踪</button>
      <button id="stop">停止追踪</button>
      <button id="refreshNow">立即刷新</button>
      <button id="themeToggle">切换主题</button>
      <label class="muted">刷新间隔</label>
      <select id="intervalSel">
        <option value="3">3s</option>
        <option value="5" selected>5s</option>
        <option value="10">10s</option>
      </select>
      <label class="muted"><input type="checkbox" id="includeFailed" /> 展示失败样本</label>
    </div>
    <div class="row">
      <span id="healthBadge" class="badge ok">状态：待命</span>
      <span class="muted" id="status">尚未开始追踪</span>
    </div>
  </div>

  <div class="card kpis">
    <div class="kpi"><div class="muted">点位数</div><div id="kpiPoints" class="v">0</div></div>
    <div class="kpi"><div class="muted">最新 holder_count</div><div id="kpiHolder" class="v">-</div></div>
    <div class="kpi"><div class="muted">最新 trimmed_avg</div><div id="kpiTrimmed" class="v">-</div></div>
    <div class="kpi"><div class="muted">最新 top50_total_raw</div><div id="kpiRaw" class="v">-</div></div>
  </div>

  <div class="card">
    <canvas id="chart"></canvas>
  </div>

  <div class="card">
    <div class="muted">活动日志（最近 20 条）</div>
    <div id="activity"></div>
  </div>

  <script>
    const caInput = document.getElementById('ca');
    const statusEl = document.getElementById('status');
    const healthBadge = document.getElementById('healthBadge');
    const intervalSel = document.getElementById('intervalSel');
    const includeFailedEl = document.getElementById('includeFailed');
    const ctx = document.getElementById('chart');
    const kpiPoints = document.getElementById('kpiPoints');
    const kpiHolder = document.getElementById('kpiHolder');
    const kpiTrimmed = document.getElementById('kpiTrimmed');
    const kpiRaw = document.getElementById('kpiRaw');
    const activityEl = document.getElementById('activity');

    let timer = null;
    const activity = [];

    function addLog(msg) {
      const ts = new Date().toLocaleTimeString();
      activity.unshift(`[${ts}] ${msg}`);
      if (activity.length > 20) activity.pop();
      activityEl.innerHTML = activity.map(x => `<div>${x}</div>`).join('');
    }

    function initTheme() {
      const t = localStorage.getItem('solsum_theme') || 'light';
      document.body.classList.toggle('dark', t === 'dark');
    }

    const chart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: [],
        datasets: [
          { label: 'holder_count', data: [], borderColor: '#2563eb', tension: 0.2 },
          { label: 'trimmed_avg', data: [], borderColor: '#16a34a', tension: 0.2 },
          { label: 'top50_total_raw', data: [], borderColor: '#ea580c', tension: 0.2 },
        ]
      },
      options: { responsive: true, animation: false, scales: { x: { ticks: { maxTicksLimit: 12 } } } }
    });

    function setBadge(kind, text) {
      healthBadge.className = `badge ${kind}`;
      healthBadge.textContent = text;
    }

    function fmt(n) {
      if (n === null || n === undefined) return '-';
      const x = Number(n);
      if (!Number.isFinite(x)) return '-';
      if (Math.abs(x) >= 1_000_000) return (x / 1_000_000).toFixed(2) + 'M';
      if (Math.abs(x) >= 1_000) return (x / 1_000).toFixed(1) + 'K';
      return x.toFixed(2);
    }

    async function post(url, body) {
      const r = await fetch(url, {
        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body)
      });
      if (!r.ok) throw new Error(await r.text());
      return await r.json();
    }

    async function refresh() {
      const ca = caInput.value.trim();
      if (!ca) return;
      try {
        const includeFailed = includeFailedEl.checked ? 'true' : 'false';
        const r = await fetch(`/metrics?ca=${encodeURIComponent(ca)}&limit=120&include_failed=${includeFailed}`);
        if (!r.ok) throw new Error(await r.text());
        const data = await r.json();
        const items = data.items || [];

        chart.data.labels = items.map(i => new Date(i.ts * 1000).toLocaleTimeString());
        chart.data.datasets[0].data = items.map(i => i.holder_count);
        chart.data.datasets[1].data = items.map(i => i.trimmed_avg);
        chart.data.datasets[2].data = items.map(i => i.top50_total_raw);
        chart.update();

        const last = items.length ? items[items.length - 1] : null;
        kpiPoints.textContent = String(items.length);
        kpiHolder.textContent = fmt(last?.holder_count);
        kpiTrimmed.textContent = fmt(last?.trimmed_avg);
        kpiRaw.textContent = fmt(last?.top50_total_raw);

        if (data.degraded) setBadge('warn', '状态：降级中'); else setBadge('ok', '状态：正常');
        let extra = '';
        if (data.degraded) extra += ' | degraded=true (rpc_limited)';
        if (data.hint) extra += ` | hint: ${data.hint}`;
        statusEl.textContent = `点位 ${items.length}，最近更新时间 ${last ? new Date(last.ts * 1000).toLocaleTimeString() : '-'}${extra}`;
      } catch (e) {
        setBadge('err', '状态：刷新失败');
        statusEl.textContent = `刷新失败：${e.message}`;
        addLog(`刷新失败: ${e.message}`);
      }
    }

    function resetTimer() {
      if (timer) clearInterval(timer);
      timer = setInterval(refresh, Number(intervalSel.value) * 1000);
      addLog(`刷新间隔切换为 ${intervalSel.value}s`);
    }

    document.getElementById('start').addEventListener('click', async () => {
      const ca = caInput.value.trim();
      if (!ca) return;
      try {
        await post('/track', { ca });
        setBadge('ok', '状态：追踪中');
        statusEl.textContent = '已启动追踪';
        addLog('已启动追踪');
      } catch (e) {
        setBadge('err', '状态：启动失败');
        statusEl.textContent = `启动失败：${e.message}`;
        addLog(`启动失败: ${e.message}`);
      }
    });

    document.getElementById('stop').addEventListener('click', async () => {
      const ca = caInput.value.trim();
      if (!ca) return;
      try {
        await post('/stop', { ca });
        setBadge('warn', '状态：已停止');
        statusEl.textContent = '已停止追踪';
        addLog('已停止追踪');
      } catch (e) {
        setBadge('err', '状态：停止失败');
        statusEl.textContent = `停止失败：${e.message}`;
        addLog(`停止失败: ${e.message}`);
      }
    });

    document.getElementById('refreshNow').addEventListener('click', async () => {
      await refresh();
      addLog('手动刷新一次');
    });

    document.getElementById('copyCa').addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(caInput.value.trim());
        statusEl.textContent = 'CA 已复制到剪贴板';
        addLog('CA 已复制');
      } catch (e) {
        statusEl.textContent = `复制失败：${e.message}`;
      }
    });

    document.getElementById('themeToggle').addEventListener('click', () => {
      document.body.classList.toggle('dark');
      localStorage.setItem('solsum_theme', document.body.classList.contains('dark') ? 'dark' : 'light');
      addLog('主题已切换');
    });

    intervalSel.addEventListener('change', resetTimer);
    includeFailedEl.addEventListener('change', () => {
      addLog(`include_failed=${includeFailedEl.checked}`);
      refresh();
    });

    // keyboard shortcut: r refresh, s start, x stop
    document.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT') return;
      if (e.key === 'r') document.getElementById('refreshNow').click();
      if (e.key === 's') document.getElementById('start').click();
      if (e.key === 'x') document.getElementById('stop').click();
    });

    initTheme();
    resetTimer();
    refresh();
  </script>
</body>
</html>
