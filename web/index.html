<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>sol_summary</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: sans-serif; margin: 20px; }
    .row { margin-bottom: 10px; }
    input { width: 560px; }
    canvas { max-width: 1200px; height: 420px; }
    .muted { color: #666; }
  </style>
</head>
<body>
  <h2>sol_summary 实时监控</h2>
  <div class="row">
    <input id="ca" placeholder="输入 CA" value="E9SmMCvtLfitMwkLzkduwgN8ZYcfepiELLQ8d1SApump" />
    <button id="start">开始追踪</button>
    <button id="stop">停止追踪</button>
  </div>
  <div class="row muted" id="status">状态：未开始</div>
  <canvas id="chart"></canvas>

  <script>
    const caInput = document.getElementById('ca');
    const statusEl = document.getElementById('status');
    const ctx = document.getElementById('chart');

    const chart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: [],
        datasets: [
          { label: 'holder_count', data: [], borderColor: '#2563eb', tension: 0.2 },
          { label: 'trimmed_avg', data: [], borderColor: '#16a34a', tension: 0.2 },
          { label: 'top50_total_raw', data: [], borderColor: '#ea580c', tension: 0.2 },
        ]
      },
      options: {
        responsive: true,
        animation: false,
        scales: { x: { ticks: { maxTicksLimit: 12 } } }
      }
    });

    async function post(url, body) {
      const r = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (!r.ok) throw new Error(await r.text());
      return await r.json();
    }

    async function refresh() {
      const ca = caInput.value.trim();
      if (!ca) return;
      try {
        const r = await fetch(`/metrics?ca=${encodeURIComponent(ca)}&limit=120`);
        if (!r.ok) return;
        const data = await r.json();
        const items = data.items || [];
        chart.data.labels = items.map(i => new Date(i.ts * 1000).toLocaleTimeString());
        chart.data.datasets[0].data = items.map(i => i.holder_count);
        chart.data.datasets[1].data = items.map(i => i.trimmed_avg);
        chart.data.datasets[2].data = items.map(i => i.top50_total_raw);
        chart.update();
        statusEl.textContent = `状态：追踪中，点位 ${items.length}，最近更新时间 ${items.length ? new Date(items[items.length-1].ts * 1000).toLocaleTimeString() : '-'}`;
      } catch (e) {
        statusEl.textContent = `状态：刷新失败 ${e.message}`;
      }
    }

    document.getElementById('start').addEventListener('click', async () => {
      const ca = caInput.value.trim();
      if (!ca) return;
      try {
        await post('/track', { ca });
        statusEl.textContent = '状态：已启动追踪';
      } catch (e) {
        statusEl.textContent = `状态：启动失败 ${e.message}`;
      }
    });

    document.getElementById('stop').addEventListener('click', async () => {
      const ca = caInput.value.trim();
      if (!ca) return;
      try {
        await post('/stop', { ca });
        statusEl.textContent = '状态：已停止追踪';
      } catch (e) {
        statusEl.textContent = `状态：停止失败 ${e.message}`;
      }
    });

    setInterval(refresh, 5000);
    refresh();
  </script>
</body>
</html>
